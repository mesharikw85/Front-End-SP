<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz App</title>
</head>

<body>
  <div class="quiz-app">
    <div class="quiz-info">
      <div class="category">Category: <span>HTML</span></div>
      <div class="count">Questions Count <span>10</span></div>
    </div>
    <div class="quiz-area">
      <h2>Why We Use &lt;br&gt; Element"</h2>
    </div>
    <div class="answer-are">
      <div class="answer">
        <input type="radio" name="questions" id="answer_1">
        <label for="answer_1">To Make Text Bold</label>
      </div>
      <div class="answer">
        <input type="radio" name="questions" id="answer_2">
        <label for="answer_2">To Make Text Italic"</label>
      </div>
      <div class="answer">
        <input type="radio" name="questions" id="answer_3">
        <label for="answer_3">To Add Breakline"</label>
      </div>
      <div class="answer">
        <input type="radio" name="questions" id="answer_4">
        <label for="answer_4">To Create Horizontal Line</label>
      </div>
    </div>
    <button class="submit-answer">Submit Answer</button>
    <div class="bullets">
      <div class="spans">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>
      <div class="countdown">
        <span class="minutes">02:</span>
        <span class="seconds">45</span>
      </div>
    </div>
    <div class="results"></div>
  </div>
</body>

</html>
